services:
  backend:
    build: ./backend
    container_name: sevaknet-backend
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - NODE_ENV=development
    # .env is copied inside Dockerfile, so other vars like FIREBASE_PROJECT_ID are loaded via dotenv

  frontend:
    build: ./frontend
    container_name: sevaknet-frontend
    ports:
      - "5173:5173"
    environment:
      - BACKEND_URL=http://backend:4000
    depends_on:
      - backend
